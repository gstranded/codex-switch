name: Build Desktop Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to build and publish"
        required: true
        default: "v0.3.0"

permissions:
  contents: write

concurrency:
  group: desktop-release-${{ inputs.release_tag }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Windows x64
            os: windows-2022
            platform: windows
          - label: macOS universal
            os: macos-14
            platform: macos
          - label: Linux x64
            os: ubuntu-22.04
            platform: linux

    env:
      CARGO_INCREMENTAL: "0"
      CARGO_TERM_COLOR: always
      RELEASE_TAG: ${{ inputs.release_tag }}

    steps:
      - name: Checkout release source
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.release_tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.12.3
          run_install: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add macOS Rust targets
        if: matrix.platform == 'macos'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Install Linux system deps
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libfuse2 \
            libgtk-3-dev \
            librsvg2-dev \
            libssl-dev \
            patchelf \
            pkg-config \
            rpm \
            wget \
            xdg-utils
          sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.1-dev \
            || sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.0-dev
          sudo apt-get install -y --no-install-recommends libsoup-3.0-dev \
            || sudo apt-get install -y --no-install-recommends libsoup2.4-dev

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Disable updater artifacts for unsigned preview builds
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          @'
          {
            "bundle": {
              "createUpdaterArtifacts": false
            }
          }
          '@ | Set-Content -Path tauri.release-preview.conf.json -Encoding UTF8

      - name: Disable updater artifacts for unsigned preview builds
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cat > tauri.release-preview.conf.json <<'JSON'
          {
            "bundle": {
              "createUpdaterArtifacts": false
            }
          }
          JSON

      - name: Build Windows app
        if: matrix.platform == 'windows'
        shell: pwsh
        run: pnpm tauri build --ci --bundles msi nsis --config tauri.release-preview.conf.json

      - name: Build macOS app
        if: matrix.platform == 'macos'
        shell: bash
        run: pnpm tauri build --ci --target universal-apple-darwin --config tauri.release-preview.conf.json

      - name: Build Linux app
        if: matrix.platform == 'linux'
        shell: bash
        run: pnpm tauri build --ci --bundles appimage,deb,rpm --config tauri.release-preview.conf.json

      - name: Collect Windows assets
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force -Path release-assets | Out-Null
          $safeVersion = $env:RELEASE_TAG.TrimStart('v')

          $bundleRoot = 'src-tauri/target/release/bundle'
          $msi = Get-ChildItem -Path $bundleRoot -Recurse -Filter '*.msi' |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1
          if ($null -eq $msi) {
            throw "No MSI installer found under $bundleRoot"
          }
          Copy-Item $msi.FullName (Join-Path release-assets "Codex-Switch-$safeVersion-Windows-x64.msi")

          $nsis = Get-ChildItem -Path $bundleRoot -Recurse -Filter '*.exe' |
            Where-Object { $_.FullName -match '\\nsis\\' -or $_.Name -match 'setup|installer' } |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1
          if ($null -eq $nsis) {
            throw "No NSIS setup EXE found under $bundleRoot"
          }
          Copy-Item $nsis.FullName (Join-Path release-assets "Codex-Switch-$safeVersion-Windows-x64-Setup.exe")

          $exePath = 'src-tauri/target/release/codex-switch.exe'
          if (!(Test-Path $exePath)) {
            throw "Portable exe not found at $exePath"
          }
          $portableDir = 'release-assets/Codex-Switch-Portable'
          New-Item -ItemType Directory -Force -Path $portableDir | Out-Null
          Copy-Item $exePath $portableDir
          @(
            '# Codex Switch portable build marker',
            'portable=true'
          ) | Set-Content -Path (Join-Path $portableDir 'portable.ini') -Encoding UTF8
          Compress-Archive -Path "$portableDir/*" -DestinationPath "release-assets/Codex-Switch-$safeVersion-Windows-x64-Portable.zip" -Force
          Remove-Item -Recurse -Force $portableDir
          Get-ChildItem release-assets

      - name: Collect macOS assets
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p release-assets
          safe_version="${RELEASE_TAG#v}"

          bundle_root="src-tauri/target/universal-apple-darwin/release/bundle"
          dmg="$(find "$bundle_root" -type f -name "*.dmg" | head -1 || true)"
          if [ -z "$dmg" ]; then
            echo "No DMG found under $bundle_root" >&2
            exit 1
          fi
          cp "$dmg" "release-assets/Codex-Switch-${safe_version}-macOS-universal.dmg"

          app_path="$(find "$bundle_root/macos" -maxdepth 1 -type d -name "*.app" | head -1 || true)"
          if [ -z "$app_path" ]; then
            echo "No .app bundle found under $bundle_root/macos" >&2
            exit 1
          fi
          ditto -c -k --sequesterRsrc --keepParent "$app_path" \
            "release-assets/Codex-Switch-${safe_version}-macOS-universal.zip"
          ls -la release-assets

      - name: Collect Linux assets
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p release-assets
          safe_version="${RELEASE_TAG#v}"
          bundle_root="src-tauri/target/release/bundle"

          appimage="$(find "$bundle_root" -type f -name "*.AppImage" | head -1 || true)"
          if [ -z "$appimage" ]; then
            echo "No AppImage found under $bundle_root" >&2
            exit 1
          fi
          cp "$appimage" "release-assets/Codex-Switch-${safe_version}-Linux-x64.AppImage"
          chmod +x "release-assets/Codex-Switch-${safe_version}-Linux-x64.AppImage"

          deb="$(find "$bundle_root" -type f -name "*.deb" | head -1 || true)"
          if [ -n "$deb" ]; then
            cp "$deb" "release-assets/Codex-Switch-${safe_version}-Linux-x64.deb"
          fi

          rpm="$(find "$bundle_root" -type f -name "*.rpm" | head -1 || true)"
          if [ -n "$rpm" ]; then
            cp "$rpm" "release-assets/Codex-Switch-${safe_version}-Linux-x64.rpm"
          fi
          ls -la release-assets

      - name: Upload release artifacts
        uses: actions/upload-artifact@v6
        with:
          name: release-assets-${{ matrix.platform }}
          path: release-assets/*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-22.04
    needs: build
    env:
      RELEASE_TAG: ${{ inputs.release_tag }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout release notes
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.release_tag }}

      - name: Download built artifacts
        uses: actions/download-artifact@v6
        with:
          pattern: release-assets-*
          path: release-assets
          merge-multiple: true

      - name: Create checksums
        shell: bash
        run: |
          set -euxo pipefail
          find release-assets -maxdepth 1 -type f -print | sort
          (
            cd release-assets
            sha256sum * | sort -k2 > SHA256SUMS.txt
            cat SHA256SUMS.txt
          )

      - name: Publish release
        shell: bash
        run: |
          set -euxo pipefail
          notes_file="RELEASE_NOTES_${RELEASE_TAG}.md"
          if [ ! -f "$notes_file" ]; then
            notes_file="RELEASE_NOTES_v0.2.0.md"
          fi
          if [ ! -f "$notes_file" ]; then
            echo "Release notes file not found" >&2
            exit 1
          fi

          title="Codex Switch ${RELEASE_TAG}"
          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" release-assets/* --clobber --repo "$GITHUB_REPOSITORY"
            gh release edit "$RELEASE_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$title" \
              --notes-file "$notes_file" \
              --prerelease=false \
              --latest
          else
            gh release create "$RELEASE_TAG" release-assets/* \
              --repo "$GITHUB_REPOSITORY" \
              --title "$title" \
              --notes-file "$notes_file"
            gh release edit "$RELEASE_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --prerelease=false \
              --latest
          fi
